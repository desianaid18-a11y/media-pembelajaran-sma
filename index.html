<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Media Pembelajaran — Teks Laporan</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #3B6D11;
    --green-light: #EAF3DE;
    --green-dark: #27500A;
    --blue: #185FA5;
    --blue-light: #E6F1FB;
    --blue-dark: #0C447C;
    --amber: #854F0B;
    --amber-light: #FAEEDA;
    --amber-dark: #633806;
    --gray: #6B7280;
    --gray-light: #F3F4F6;
    --text: #1a1a1a;
    --text-muted: #6B7280;
    --text-hint: #9CA3AF;
    --border: #E5E7EB;
    --surface: #F9FAFB;
    --white: #ffffff;
    --radius: 12px;
    --radius-sm: 8px;
  }

  html, body {
    min-height: 100vh;
    background: #F0F2F5;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  .shell {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 20px 16px 40px;
  }

  .app-header {
    width: 100%;
    max-width: 420px;
    text-align: center;
    margin-bottom: 16px;
  }
  .app-header .kelas { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; color: var(--text-hint); text-transform: uppercase; margin-bottom: 4px; }
  .app-header h1 { font-size: 16px; font-weight: 600; color: var(--text); }

  .topic-tabs {
    width: 100%;
    max-width: 420px;
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .topic-tab {
    flex: 1;
    padding: 9px 12px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--white);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .topic-tab.active-green { border-color: var(--green); background: var(--green-light); color: var(--green-dark); }
  .topic-tab.active-blue  { border-color: var(--blue);  background: var(--blue-light);  color: var(--blue-dark);  }

  .card {
    width: 100%;
    max-width: 420px;
    background: var(--white);
    border-radius: 18px;
    border: 1px solid var(--border);
    overflow: hidden;
    flex: 1;
  }

  .card-hero {
    padding: 16px 18px 14px;
    border-bottom: 1px solid var(--border);
  }
  .pill {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 8px;
  }
  .pill-green { background: var(--green-light); color: var(--green); }
  .pill-blue  { background: var(--blue-light);  color: var(--blue);  }
  .card-title { font-size: 15px; font-weight: 600; line-height: 1.4; margin-bottom: 3px; }
  .card-meta  { font-size: 11px; color: var(--text-hint); }

  .progress-track {
    height: 3px;
    background: var(--gray-light);
  }
  .progress-fill {
    height: 3px;
    transition: width 0.35s ease;
  }
  .fill-green { background: var(--green); }
  .fill-blue  { background: var(--blue);  }

  .screen-body {
    padding: 18px 18px 14px;
    min-height: 320px;
  }

  .section-label {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .sec-badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 4px;
  }
  .sb-green { background: var(--green-light); color: var(--green); }
  .sb-blue  { background: var(--blue-light);  color: var(--blue);  }
  .sb-amber { background: var(--amber-light); color: var(--amber); }
  .sec-line { flex: 1; height: 1px; background: var(--border); }

  .teks {
    font-size: 13.5px;
    line-height: 1.8;
    color: var(--text);
    margin-bottom: 12px;
  }
  .hl-g { background: var(--green-light); color: var(--green-dark); border-radius: 3px; padding: 0 3px; }
  .hl-b { background: var(--blue-light);  color: var(--blue-dark);  border-radius: 3px; padding: 0 3px; }
  .hl-a { background: var(--amber-light); color: var(--amber-dark); border-radius: 3px; padding: 0 3px; }

  .callout {
    border-radius: var(--radius-sm);
    padding: 10px 13px;
    margin-top: 10px;
    font-size: 12.5px;
    line-height: 1.6;
  }
  .callout-title { font-weight: 700; font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; display: block; margin-bottom: 4px; }
  .callout-g { background: var(--green-light); color: var(--green-dark); }
  .callout-b { background: var(--blue-light);  color: var(--blue-dark);  }
  .callout-a { background: var(--amber-light); color: var(--amber-dark); }

  .stat-row { display: flex; gap: 8px; margin: 10px 0 12px; }
  .stat-box {
    flex: 1;
    background: var(--surface);
    border-radius: var(--radius-sm);
    padding: 10px 8px;
    text-align: center;
    border: 1px solid var(--border);
  }
  .stat-num { font-size: 18px; font-weight: 700; }
  .stat-label { font-size: 10px; color: var(--text-hint); margin-top: 2px; line-height: 1.3; }

  .info-step { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 10px; }
  .step-num {
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0; margin-top: 1px;
  }
  .sn-g { background: var(--green-light); color: var(--green); }
  .sn-b { background: var(--blue-light);  color: var(--blue);  }
  .sn-a { background: var(--amber-light); color: var(--amber); }
  .sn-r { background: #FCEBEB; color: #A32D2D; }
  .step-body {}
  .step-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .step-desc  { font-size: 12px; color: var(--text-muted); line-height: 1.55; }
  .step-connector { width: 1px; height: 10px; background: var(--border); margin-left: 12px; margin-bottom: 0; }

  .finish-icon {
    width: 48px; height: 48px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 12px;
    font-size: 22px;
  }
  .fi-green { background: var(--green-light); color: var(--green); }
  .fi-blue  { background: var(--blue-light);  color: var(--blue);  }

  .legenda {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    padding: 10px 18px;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }
  .leg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-muted); }
  .leg-dot { width: 9px; height: 9px; border-radius: 3px; }

  .nav-bar {
    width: 100%;
    max-width: 420px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 14px;
    gap: 8px;
  }
  .nav-btn {
    padding: 10px 20px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--white);
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-btn.primary-green { background: var(--green); border-color: var(--green); color: white; }
  .nav-btn.primary-blue  { background: var(--blue);  border-color: var(--blue);  color: white; }
  .step-counter { font-size: 12px; color: var(--text-hint); font-weight: 500; }

  .dot-row { display: flex; gap: 5px; justify-content: center; margin-top: 10px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); transition: all 0.25s; }
  .dot.active-green { background: var(--green); width: 18px; border-radius: 3px; }
  .dot.active-blue  { background: var(--blue);  width: 18px; border-radius: 3px; }

  @media (max-width: 440px) {
    .shell { padding: 14px 10px 32px; }
    .screen-body { padding: 14px 14px 12px; }
    .card-hero { padding: 14px 14px 12px; }
    .legenda { padding: 10px 14px; }
  }
</style>
</head>
<body>
<div class="shell">

  <div class="app-header">
    <p class="kelas">Bahasa Indonesia · SMA</p>
    <h1>Media Pembelajaran Teks Laporan</h1>
  </div>

  <div class="topic-tabs">
    <button class="topic-tab active-green" onclick="switchTopic(0,this)" id="tab0">Sampah</button>
    <button class="topic-tab" onclick="switchTopic(1,this)" id="tab1">Media Sosial</button>
  </div>

  <div class="card">
    <div class="card-hero">
      <div class="pill pill-green" id="card-pill">Topik: Lingkungan</div>
      <div class="card-title" id="card-title">Fenomena Sampah di Lingkungan Perkotaan</div>
      <div class="card-meta" id="card-meta">Bacaan interaktif · 5 halaman</div>
    </div>
    <div class="progress-track">
      <div class="progress-fill fill-green" id="prog" style="width:20%"></div>
    </div>
    <div class="screen-body" id="screen"></div>
    <div class="legenda">
      <div class="leg"><div class="leg-dot" style="background:#639922"></div>Bagian awal</div>
      <div class="leg"><div class="leg-dot" style="background:#378ADD"></div>Bagian tengah</div>
      <div class="leg"><div class="leg-dot" style="background:#BA7517"></div>Bagian akhir</div>
    </div>
  </div>

  <div class="dot-row" id="dots"></div>

  <div class="nav-bar">
    <button class="nav-btn" id="btn-prev" onclick="move(-1)" disabled>← Kembali</button>
    <span class="step-counter" id="step-lbl">1 / 5</span>
    <button class="nav-btn primary-green" id="btn-next" onclick="move(1)">Lanjut →</button>
  </div>

</div>

<script>
const topics = [
  {
    pill: "Topik: Lingkungan",
    pillClass: "pill-green",
    title: "Fenomena Sampah di Lingkungan Perkotaan",
    meta: "Bacaan interaktif · 5 halaman",
    color: "green",
    screens: [
      `<div class="section-label"><span class="sec-badge sb-green">Bagian awal — gambaran umum</span><div class="sec-line"></div></div>
      <p class="teks"><span class="hl-g">Sampah merupakan material sisa yang tidak diinginkan setelah berakhirnya suatu proses.</span> Di kawasan perkotaan, sampah menjadi salah satu permasalahan lingkungan yang kompleks dan memerlukan penanganan serius dari berbagai pihak. Berdasarkan hasil observasi di beberapa kota besar di Indonesia, volume sampah yang dihasilkan terus meningkat seiring pertumbuhan penduduk dan perubahan pola konsumsi masyarakat.</p>
      <div class="callout callout-g"><span class="callout-title">Perhatikan kalimat pertama</span>Penulis langsung menjelaskan <em>apa itu</em> sampah sebelum membahas hal lain. Perhatikan pola ini — bacaan laporan selalu dimulai dengan cara seperti ini.</div>`,

      `<div class="section-label"><span class="sec-badge sb-blue">Bagian tengah — rincian jenis</span><div class="sec-line"></div></div>
      <p class="teks">Sampah perkotaan dibedakan menjadi tiga jenis utama. <span class="hl-b">Sampah organik meliputi sisa makanan dan bahan dari makhluk hidup yang mudah terurai. Sampah anorganik mencakup plastik dan logam yang membutuhkan ratusan tahun untuk terurai secara alami.</span> Sementara sampah B3 mengandung zat berbahaya dan memerlukan penanganan khusus.</p>
      <div class="callout callout-b"><span class="callout-title">Perhatikan pola paragraf ini</span>Penulis membahas <em>bagian-bagian</em> dari objek satu per satu. Ada berapa jenis yang dirinci? Apa tujuan penulisan seperti ini?</div>`,

      `<div class="section-label"><span class="sec-badge sb-blue">Bagian tengah — data & fakta</span><div class="sec-line"></div></div>
      <div class="stat-row">
        <div class="stat-box"><div class="stat-num" style="color:#185FA5">60%+</div><div class="stat-label">sampah belum terkelola optimal</div></div>
        <div class="stat-box"><div class="stat-num" style="color:#185FA5">30%</div><div class="stat-label">reduksi lewat program pemilahan</div></div>
      </div>
      <p class="teks"><span class="hl-b">Data Kementerian Lingkungan Hidup menunjukkan lebih dari 60% sampah di Indonesia belum dikelola secara optimal.</span> Beberapa kota menerapkan program bank sampah, daur ulang, dan pengomposan sebagai solusi untuk mengurangi volume sampah di TPA.</p>
      <div class="callout callout-b"><span class="callout-title">Perhatikan penggunaan data</span>Penulis menyertakan angka dan sumber yang jelas. Mengapa data penting dalam jenis bacaan seperti ini?</div>`,

      `<div class="section-label"><span class="sec-badge sb-amber">Bagian akhir — manfaat & simpulan</span><div class="sec-line"></div></div>
      <p class="teks"><span class="hl-a">Pengelolaan sampah yang tepat memberikan manfaat ganda: menjaga kebersihan lingkungan sekaligus menciptakan nilai ekonomi melalui daur ulang dan bioenergi.</span> Program pemilahan sampah dari sumber terbukti mampu mengurangi volume sampah di TPA hingga 30%. Kesadaran kolektif dan dukungan kebijakan menjadi kunci keberhasilan pengelolaan sampah yang berkelanjutan.</p>
      <div class="callout callout-a"><span class="callout-title">Bandingkan dengan bagian awal</span>Paragraf ini berbeda dari yang sebelumnya — penulis tidak lagi merinci, tapi menyimpulkan. Apa perbedaan "nada" yang kamu rasakan?</div>`,

      `<div style="text-align:center;padding-bottom:14px;">
        <div class="finish-icon fi-green">✓</div>
        <div style="font-size:15px;font-weight:700;margin-bottom:6px;">Selesai membaca!</div>
        <div style="font-size:12.5px;color:#6B7280;line-height:1.65;margin-bottom:16px;">Kamu baru saja membaca teks yang memiliki tiga bagian berbeda. Coba ingat — bagian mana yang paling mudah kamu kenali?</div>
      </div>
      <div class="info-step"><div class="step-num sn-g">1</div><div class="step-body"><div class="step-title">Gambaran umum objek</div><div class="step-desc">Penulis memperkenalkan topik dan definisi di awal.</div></div></div>
      <div class="step-connector"></div>
      <div class="info-step"><div class="step-num sn-b">2</div><div class="step-body"><div class="step-title">Rincian aspek & data</div><div class="step-desc">Penulis menguraikan bagian-bagian objek dan menyertakan data pendukung.</div></div></div>
      <div class="step-connector"></div>
      <div class="info-step"><div class="step-num sn-a">3</div><div class="step-body"><div class="step-title">Manfaat & simpulan</div><div class="step-desc">Penulis menutup dengan manfaat atau kesimpulan dari seluruh uraian.</div></div></div>`
    ]
  },
  {
    pill: "Topik: Digital",
    pillClass: "pill-blue",
    title: "Pola Penggunaan Media Sosial Remaja Indonesia",
    meta: "Bacaan interaktif · 5 halaman",
    color: "blue",
    screens: [
      `<div class="section-label"><span class="sec-badge sb-green">Bagian awal — gambaran umum</span><div class="sec-line"></div></div>
      <p class="teks"><span class="hl-g">Media sosial adalah platform digital yang memungkinkan penggunanya untuk berbagi informasi, berinteraksi, dan membangun komunitas secara daring.</span> Di Indonesia, media sosial telah menjadi bagian yang tidak terpisahkan dari kehidupan remaja usia 13–18 tahun. Berdasarkan observasi terhadap 200 siswa SMA di empat provinsi, ditemukan pola penggunaan yang memengaruhi kehidupan sosial dan akademik para remaja.</p>
      <div class="callout callout-g"><span class="callout-title">Perhatikan kalimat pertama</span>Seperti teks sebelumnya, penulis membuka dengan <em>definisi</em>. Apakah kamu menemukan pola yang sama dengan teks tentang sampah?</div>`,

      `<div class="section-label"><span class="sec-badge sb-blue">Bagian tengah — data penggunaan</span><div class="sec-line"></div></div>
      <div class="stat-row">
        <div class="stat-box"><div class="stat-num" style="color:#185FA5">89%</div><div class="stat-label">WhatsApp</div></div>
        <div class="stat-box"><div class="stat-num" style="color:#185FA5">78%</div><div class="stat-label">TikTok</div></div>
        <div class="stat-box"><div class="stat-num" style="color:#185FA5">5–7 jam</div><div class="stat-label">per hari</div></div>
      </div>
      <p class="teks"><span class="hl-b">Platform yang paling banyak digunakan adalah WhatsApp (89%), TikTok (78%), Instagram (65%), dan YouTube (61%).</span> Rata-rata waktu yang dihabiskan remaja di media sosial mencapai 5–7 jam per hari, dengan puncak aktivitas pukul 19.00–23.00.</p>
      <div class="callout callout-b"><span class="callout-title">Perhatikan penggunaan data</span>Penulis menyertakan angka-angka spesifik. Apa fungsi data ini dalam mendukung isi bacaan?</div>`,

      `<div class="section-label"><span class="sec-badge sb-blue">Bagian tengah — dampak teramati</span><div class="sec-line"></div></div>
      <div class="info-step"><div class="step-num sn-g">+</div><div class="step-body"><div class="step-title">Dampak positif</div><div class="step-desc">Akses informasi mudah, perluasan jaringan pertemanan, sarana ekspresi kreativitas.</div></div></div>
      <div class="step-connector"></div>
      <div class="info-step"><div class="step-num sn-r">−</div><div class="step-body"><div class="step-title">Dampak negatif</div><div class="step-desc">Konsentrasi belajar menurun, gangguan pola tidur, 43% pernah terpapar informasi tidak akurat.</div></div></div>
      <div class="callout callout-b" style="margin-top:12px"><span class="callout-title">Perhatikan cara penulis menyajikan dua sisi</span>Penulis membahas dampak positif <em>dan</em> negatif. Mengapa tidak hanya salah satu saja?</div>`,

      `<div class="section-label"><span class="sec-badge sb-amber">Bagian akhir — simpulan</span><div class="sec-line"></div></div>
      <p class="teks"><span class="hl-a">Literasi digital yang baik — mencakup kemampuan memilah informasi, mengelola waktu layar, dan berinteraksi secara etis — menjadi kompetensi krusial di era ini.</span> Sekolah dan keluarga perlu berkolaborasi dalam membangun kebiasaan digital yang sehat agar remaja dapat memanfaatkan media sosial sebagai aset, bukan hambatan, dalam pengembangan diri mereka.</p>
      <div class="callout callout-a"><span class="callout-title">Bandingkan bagian awal dan akhir ini</span>Teks dibuka dengan definisi, ditutup dengan rekomendasi. Apakah kamu merasakan perbedaan "tujuan" di kedua bagian itu?</div>`,

      `<div style="text-align:center;padding-bottom:14px;">
        <div class="finish-icon fi-blue">✓</div>
        <div style="font-size:15px;font-weight:700;margin-bottom:6px;">Selesai membaca!</div>
        <div style="font-size:12.5px;color:#6B7280;line-height:1.65;margin-bottom:16px;">Kamu sudah membaca dua teks berbeda. Apakah kamu menemukan <em>pola yang sama</em> di keduanya?</div>
      </div>
      <div class="info-step"><div class="step-num sn-g">1</div><div class="step-body"><div class="step-title">Gambaran umum objek</div><div class="step-desc">Definisi dan konteks di paragraf pembuka.</div></div></div>
      <div class="step-connector"></div>
      <div class="info-step"><div class="step-num sn-b">2</div><div class="step-body"><div class="step-title">Rincian aspek & data</div><div class="step-desc">Uraian bagian-bagian objek dilengkapi angka dan fakta.</div></div></div>
      <div class="step-connector"></div>
      <div class="info-step"><div class="step-num sn-a">3</div><div class="step-body"><div class="step-title">Manfaat & simpulan</div><div class="step-desc">Penutup berisi kesimpulan atau rekomendasi.</div></div></div>`
    ]
  }
];

let curTopic = 0, curStep = 0;

function render() {
  const t = topics[curTopic];
  const total = t.screens.length;
  const c = t.color;

  document.getElementById('card-pill').className = 'pill ' + t.pillClass;
  document.getElementById('card-pill').textContent = t.pill;
  document.getElementById('card-title').textContent = t.title;
  document.getElementById('card-meta').textContent = t.meta;
  document.getElementById('prog').className = 'progress-fill fill-' + c;
  document.getElementById('prog').style.width = ((curStep+1)/total*100) + '%';
  document.getElementById('screen').innerHTML = t.screens[curStep];
  document.getElementById('step-lbl').textContent = (curStep+1) + ' / ' + total;

  const prev = document.getElementById('btn-prev');
  const next = document.getElementById('btn-next');
  prev.disabled = curStep === 0;
  next.className = 'nav-btn primary-' + c;
  next.textContent = curStep === total-1 ? '✓ Selesai' : 'Lanjut →';
  next.disabled = false;

  const dots = document.getElementById('dots');
  dots.innerHTML = '';
  for(let i=0; i<total; i++){
    const d = document.createElement('div');
    d.className = 'dot' + (i===curStep ? ' active-'+c : '');
    dots.appendChild(d);
  }

  document.querySelectorAll('.topic-tab').forEach((b,i) => {
    b.className = 'topic-tab' + (i===curTopic ? ' active-'+topics[i].color : '');
  });
}

function move(dir) {
  const total = topics[curTopic].screens.length;
  curStep = Math.max(0, Math.min(total-1, curStep+dir));
  render();
}

function switchTopic(idx) {
  curTopic = idx;
  curStep = 0;
  render();
}

render();
</script>
</body>
</html>
